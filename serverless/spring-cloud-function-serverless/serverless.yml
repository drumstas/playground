service: spring-cloud-function-serverless

provider:
  name: aws
  runtime: java11
  region: eu-west-1
  profile: serverless-admin
  memorySize: 1024
  timeout: 10
  lambdaHashingVersion: 20201221
  logRetentionInDays: 7
  iamRoleStatements:
    - Effect: 'Allow'
      Action:
        - 's3:*'
      Resource:
        - 'arn:aws:s3:::${self:custom.bucket}/*'

custom:
  bucket: order-event-bucket

package:
  artifact: target/spring-cloud-function-serverless-1.0.0-shaded.jar

functions:
  uppercase:
    handler: org.springframework.cloud.function.adapter.aws.FunctionInvoker
    environment:
      SPRING_CLOUD_FUNCTION_DEFINITION: uppercase

  randomString:
    handler: com.example.springcloudfunctionserverless.handlers.EmptyInputHandler
    environment:
      SPRING_CLOUD_FUNCTION_DEFINITION: randomString

  s3EventProcessor:
    handler: com.example.springcloudfunctionserverless.handlers.S3EventHandler
    events:
      - s3:
          bucket: ${self:custom.bucket}
          event: s3:ObjectCreated:*
    environment:
      FUNCTION_NAME: processS3Event

  createPerson:
    handler: org.springframework.cloud.function.adapter.aws.SpringBootApiGatewayRequestHandler
      events:
          - http:
            path: persons
            method: post
            cors: true
      environment:
        FUNCTION_NAME: processPerson

  createXmlOrder:
    handler: org.springframework.cloud.function.adapter.aws.SpringBootStreamHandler
      events:
          - http:
            path: orders
            method: post
            cors: true
      environment:
        FUNCTION_NAME: processXmlOrder
